events {
    worker_connections 1024;
}

http {
    # Security: Prevent buffer overflow attacks by capping uploads to 10MB [cite: 2027, 2028, 2676]
    client_max_body_size 10M;

    server {
        listen 80;
        server_name localhost;

        # Route 1: The API Gateway [cite: 2163]
        # The trailing slash on the proxy_pass URL automatically strips the "/api" prefix [cite: 2164, 2892, 2894]
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Allow ML tasks to run for up to 5 minutes without Nginx dropping the connection [cite: 2167, 2169]
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }

        # Route 2: The React Frontend [cite: 2164]
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}