services:
  # 1. The Message Broker (In-Memory Queue) [cite: 2180, 2181]
  redis:
    image: redis:alpine
    expose:
      - "6379"
    restart: always

  # 2. The API Gateway (FastAPI) [cite: 2670]
  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SHARED_UPLOADS_DIR=/app/shared_uploads
      - HF_HOME=/app/.huggingface_cache # Tells transformers where to store weights [cite: 2856]
    volumes:
      - shared_uploads:/app/shared_uploads # Claim Check Pattern volume [cite: 2673]
      - hf_cache:/app/.huggingface_cache   # Cache volume to prevent re-downloading TrOCR [cite: 2855, 2859]
    expose:
      - "8000"
    depends_on:
      - redis

  # 3. The ML Execution Engine (Celery) [cite: 2186, 2187]
  worker:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SHARED_UPLOADS_DIR=/app/shared_uploads
      - HF_HOME=/app/.huggingface_cache
      # Prevent CPU oversubscription: Force C++ math libraries to use 1 thread [cite: 2345, 2675]
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    volumes:
      - shared_uploads:/app/shared_uploads
      - hf_cache:/app/.huggingface_cache
    # Spawn 4 workers, kill and refresh a worker after 5 tasks to prevent memory leaks [cite: 2675, 3073, 3074]
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=5
    depends_on:
      - redis

  # 4. The Presentation Layer (React + TS) [cite: 2670]
  frontend:
    build: ./frontend
    expose:
      - "80"

  # 5. The Reverse Proxy (Nginx) [cite: 2672]
  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # This is the ONLY port exposed to your Mac/Internet [cite: 1890, 2158]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

# Define persistent storage locations [cite: 2673, 2859]
volumes:
  shared_uploads:
  hf_cache: