services:
  # 1. The Message Broker (In-Memory Queue)
  redis:
    image: redis:alpine
    expose:
      - "6379"
    restart: always

  # 2. The API Gateway (FastAPI)
  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SHARED_UPLOADS_DIR=/app/shared_uploads
      - HF_HOME=/app/.huggingface_cache
      - LORA_ADAPTER_PATH=/app/lora_adapters  # Path where LoRA adapter weights are injected
    volumes:
      - ./backend/data:/app/data                                    # Sync active learning data to Mac
      - shared_uploads:/app/shared_uploads
      - hf_cache:/app/.huggingface_cache                            # Persistent base model cache
      - lora_weights:/app/lora_adapters                             # Persistent LoRA adapter weights
    ports:
      - "8000:8000"
    depends_on:
      - redis

  # 3. The ML Execution Engine (Celery)
  worker:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SHARED_UPLOADS_DIR=/app/shared_uploads
      - HF_HOME=/app/.huggingface_cache
      - LORA_ADAPTER_PATH=/app/lora_adapters  # Path where LoRA adapter weights are injected
      # Prevent CPU oversubscription: Force C++ math libraries to use 1 thread
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    volumes:
      - ./backend/data:/app/data
      - shared_uploads:/app/shared_uploads
      - hf_cache:/app/.huggingface_cache
      - lora_weights:/app/lora_adapters                             # Persistent LoRA adapter weights
    # Spawn 4 workers, kill and refresh a worker after 5 tasks to prevent memory leaks
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=5
    depends_on:
      - redis

  # 4. The Presentation Layer (React + TS)
  frontend:
    build: ./frontend
    expose:
      - "80"

  # 5. The Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # 6. Metrics Scraper (Prometheus)
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    ports:
      - "9090:9090"

  # 7. Metrics Dashboard (Grafana)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

# Define persistent storage locations
volumes:
  shared_uploads:
  hf_cache:
  lora_weights:  # Stores LoRA adapter weights; survives container restarts and hot-injection